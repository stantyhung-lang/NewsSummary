name: Daily News Digest

on:
  schedule:
    - cron: '0 12 * * *'  # UTC 12:00 = 台灣時間 20:00
  workflow_dispatch:        # 允許手動觸發，方便測試

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: 喚醒服務
        run: curl https://newssummary-3l9x.onrender.com/

      - name: 等待服務啟動
        run: sleep 40

      - name: 觸發新聞彙整與LINE推播
        run: |
          curl -X POST https://newssummary-3l9x.onrender.com/run-digest \
            --max-time 300
