name: Daily News Digest

on:
  workflow_dispatch:  # 僅保留手動觸發，排程改由 cron-job.org 負責

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: 喚醒服務（觸發冷啟動）
        run: curl -s --max-time 30 https://newssummary-3l9x.onrender.com/ || true

      - name: 等待應用程式完全初始化
        run: sleep 30

      - name: 觸發新聞彙整與LINE推播（失敗自動重試最多5次）
        run: |
          MAX_RETRY=5
          for i in $(seq 1 $MAX_RETRY); do
            echo "===== 第 $i 次嘗試 ====="
            HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" \
              -X POST https://newssummary-3l9x.onrender.com/run-digest \
              --max-time 600)
            echo "HTTP 狀態碼: $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              echo "成功！"
              cat response.txt
              exit 0
            fi

            echo "失敗內容："
            cat response.txt
            echo ""

            if [ "$i" -lt "$MAX_RETRY" ]; then
              echo "20 秒後重試..."
              sleep 20
            fi
          done

          echo "已達最大重試次數，仍然失敗"
          exit 1
