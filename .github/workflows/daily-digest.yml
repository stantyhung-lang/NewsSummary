name: Daily News Digest

on:
  schedule:
    - cron: '0 12 * * *'  # UTC 12:00 = 台灣時間 20:00
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: 等待服務完全就緒（最多等 3 分鐘）
        run: |
          echo "開始確認服務狀態..."
          READY=false
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://newssummary-3l9x.onrender.com/ || echo "000")
            echo "第 $i 次確認：HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "服務已就緒，等待額外 10 秒讓服務穩定..."
              sleep 10
              READY=true
              break
            fi
            echo "服務尚未就緒，10 秒後重試..."
            sleep 10
          done
          if [ "$READY" = "false" ]; then
            echo "警告：3 分鐘內服務未就緒，仍嘗試繼續執行下一步"
          fi

      - name: 觸發新聞彙整與LINE推播
        run: |
          curl -X POST https://newssummary-3l9x.onrender.com/run-digest \
            --max-time 600 \
            -w "\nHTTP狀態碼: %{http_code}\n耗時: %{time_total}秒\n"
